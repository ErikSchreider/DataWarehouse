services:
  exasoldb:
    container_name: exasoldb
    image: exasol/docker-db:${EXASOL_DOCKER_TAG:-2025.1.11}
    privileged: true
    restart: unless-stopped
    stop_grace_period: 120s
    ports:
      - "${EXASOL_EXTERNAL_PORT:-9563}:8563"
    volumes:
      - exasol-data:/exa

  space-traffic-etl:
    container_name: space-traffic-etl
    build:
      context: ./src/SpaceTrafficETL
      dockerfile: Dockerfile
    image: space-traffic-etl:latest
    restart: unless-stopped
    depends_on:
      - exasoldb
    environment:
      EXASOL_HOST: ${EXASOL_HOST:-exasoldb}
      EXASOL_PORT: ${EXASOL_PORT:-8563}
      EXASOL_SCHEMA: ${EXASOL_SCHEMA:-SPACE_TRAFFIC}
      EXASOL_USER: ${EXASOL_USER:-sys}
      EXASOL_PASSWORD: ${EXASOL_PASSWORD:-exasol}
      EXASOL_ODBC_DRIVER: ${EXASOL_ODBC_DRIVER:-EXASOL}
      ETL_INTERVAL_HOURS: ${ETL_INTERVAL_HOURS:-24}
      SpaceTraffic__Ucs__SatelliteDatabaseDownloadUrl: ${UCS_DOWNLOAD_URL:-https://www.ucsusa.org/resources/satellite-database}
      SpaceTraffic__Ucs__RawFileExtension: ${UCS_RAW_FILE_EXTENSION:-.html}
      SpaceTraffic__LaunchData__LaunchesUrl: ${SPACEDEVS_LAUNCH_URL:-https://ll.thespacedevs.com/2.2.0/launch/}
      SpaceTraffic__DataDirectories__StorageRoot: /data
    volumes:
      - ${ETL_DATA_DIR:-/opt/space-traffic-etl/data}:/data

  space-traffic-web:
    container_name: space-traffic-web
    build:
      context: ./src/SpaceTrafficWeb
      dockerfile: Dockerfile
    image: space-traffic-web:latest
    restart: unless-stopped
    depends_on:
      - exasoldb
      - space-traffic-etl
    ports:
      - "${WEB_PORT:-8085}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      EXASOL_HOST: ${EXASOL_HOST:-exasoldb}
      EXASOL_PORT: ${EXASOL_PORT:-8563}
      EXASOL_SCHEMA: ${EXASOL_SCHEMA:-SPACE_TRAFFIC}
      EXASOL_USER: ${EXASOL_USER:-sys}
      EXASOL_PASSWORD: ${EXASOL_PASSWORD:-exasol}
      EXASOL_ODBC_DRIVER: ${EXASOL_ODBC_DRIVER:-EXASOL}
      DATA_PROTECTION_KEYS_DIR: /app/data-protection-keys
    volumes:
      - ${WEB_KEYS_DIR:-/opt/space-traffic-web/keys}:/app/data-protection-keys

volumes:
  exasol-data:
